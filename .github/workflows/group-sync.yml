---
name: group-sync

"on":
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: gh-actions-glab-group-sync
  cancel-in-progress: false

jobs:
  sync:
    permissions:
      contents: read
    uses: ./.github/workflows/reconcile-target.yml
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}

  configure-mirrors:
    if: needs.sync.result == 'success' && needs.sync.outputs.has_mirror_targets == 'true'
    needs:
      - sync
    permissions:
      contents: read
    uses: ./.github/workflows/configure-target-mirrors.yml
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}
